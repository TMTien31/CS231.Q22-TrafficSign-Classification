<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOG Traffic Sign Model Lab</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --panel-2: #f8fafc;
            --ink: #151923;
            --muted: #667085;
            --line: #d8dee8;
            --line-strong: #b8c1cf;
            --blue: #2563eb;
            --green: #12805c;
            --orange: #d97706;
            --red: #c2410c;
            --dark: #111827;
            --soft-blue: #e8f0ff;
            --soft-green: #e7f6ef;
            --soft-orange: #fff4df;
            --shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
            --mono: Consolas, "SFMono-Regular", Menlo, monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(180deg, #f9fbff 0, var(--bg) 360px),
                var(--bg);
            color: var(--ink);
            font-family: var(--sans);
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .shell {
            width: min(1500px, calc(100% - 32px));
            margin: 0 auto;
            padding: 20px 0 44px;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #ffffff;
            background: linear-gradient(135deg, var(--blue), var(--green));
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(22px, 3vw, 34px);
            letter-spacing: 0;
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .status-pill {
            justify-self: end;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 999px;
            padding: 9px 13px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .control-panel {
            position: sticky;
            top: 16px;
            padding: 16px;
        }

        .section-title {
            margin: 0 0 12px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .drop-zone {
            position: relative;
            min-height: 176px;
            display: grid;
            place-items: center;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background: var(--panel-2);
            overflow: hidden;
        }

        .drop-zone.dragging {
            border-color: var(--blue);
            background: var(--soft-blue);
        }

        .drop-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-copy {
            text-align: center;
            padding: 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .drop-copy strong {
            color: var(--blue);
        }

        .preview {
            width: 100%;
            display: none;
            grid-template-columns: 92px 1fr;
            gap: 12px;
            align-items: center;
            padding: 12px;
        }

        .preview img {
            width: 92px;
            height: 92px;
            object-fit: contain;
            border-radius: 8px;
            background: #0f172a;
            border: 1px solid var(--line);
        }

        .preview-name {
            font-weight: 750;
            word-break: break-word;
        }

        .preview-meta {
            margin-top: 5px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 12px;
        }

        .tabs {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .tab-button {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--muted);
            font-weight: 750;
        }

        .tab-button.active {
            border-color: var(--blue);
            color: var(--blue);
            background: var(--soft-blue);
        }

        .tab-pane {
            display: none;
            margin-top: 16px;
        }

        .tab-pane.active {
            display: block;
        }

        .model-rail {
            display: grid;
            gap: 8px;
        }

        .model-button {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            width: 100%;
            min-height: 46px;
            text-align: left;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--ink);
            padding: 10px 12px;
        }

        .model-button.active {
            border-color: var(--green);
            background: var(--soft-green);
        }

        .model-name {
            font-weight: 800;
            font-size: 14px;
        }

        .model-meta {
            margin-top: 2px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 11px;
        }

        .model-tag {
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--muted);
            padding: 4px 8px;
            font-family: var(--mono);
            font-size: 11px;
        }

        .compare-selectors {
            display: grid;
            gap: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .field select {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--ink);
            padding: 0 10px;
        }

        .primary-action {
            width: 100%;
            min-height: 46px;
            margin-top: 16px;
            border: 0;
            border-radius: 8px;
            background: var(--dark);
            color: #ffffff;
            font-weight: 850;
        }

        .primary-action:disabled {
            cursor: wait;
            opacity: 0.6;
        }

        .alert {
            margin-top: 12px;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.45;
        }

        .alert-error {
            border: 1px solid #fecaca;
            background: #fff1f2;
            color: #9f1239;
        }

        .results {
            min-height: 620px;
            padding: 16px;
        }

        .empty-state {
            height: 560px;
            display: grid;
            place-items: center;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--muted);
            text-align: center;
            padding: 24px;
        }

        .empty-state strong {
            display: block;
            color: var(--ink);
            font-size: 18px;
            margin-bottom: 6px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 16px;
        }

        .result-title {
            margin: 0;
            font-size: 20px;
        }

        .result-subtitle {
            margin-top: 5px;
            color: var(--muted);
            font-size: 13px;
        }

        .model-chip {
            border-radius: 999px;
            padding: 7px 10px;
            background: var(--soft-orange);
            border: 1px solid #fed7aa;
            color: #9a3412;
            font-family: var(--mono);
            font-size: 12px;
            white-space: nowrap;
        }

        .pipeline {
            display: grid;
            gap: 12px;
        }

        .step-card {
            display: grid;
            grid-template-columns: 34px minmax(260px, 0.95fr) minmax(240px, 1.05fr);
            gap: 14px;
            align-items: stretch;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .step-index {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--dark);
            color: #ffffff;
            font-family: var(--mono);
            font-weight: 800;
            font-size: 13px;
        }

        .step-media {
            min-height: 190px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f1f5f9;
            overflow: hidden;
        }

        .step-media img {
            width: 100%;
            height: 100%;
            max-height: 260px;
            object-fit: contain;
            display: block;
        }

        .step-detail h3 {
            margin: 2px 0 6px;
            font-size: 16px;
        }

        .step-detail {
            min-width: 0;
        }

        .step-detail p {
            margin: 0 0 10px;
            color: var(--muted);
            line-height: 1.5;
            font-size: 13px;
        }

        .kv-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .kv {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            padding: 8px;
            min-width: 0;
        }

        .kv span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .kv strong {
            display: block;
            margin-top: 4px;
            font-family: var(--mono);
            font-size: 13px;
            overflow-wrap: anywhere;
        }

        .output-card {
            display: grid;
            grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
            gap: 14px;
            align-items: stretch;
            min-width: 0;
        }

        .prediction-box {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft-green);
            padding: 14px;
            display: grid;
            align-content: center;
        }

        .prediction-label {
            color: var(--green);
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
            overflow-wrap: anywhere;
        }

        .prediction-score {
            margin-top: 8px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 13px;
        }

        .score-list {
            display: grid;
            gap: 8px;
            min-width: 0;
        }

        .score-row {
            display: grid;
            grid-template-columns: minmax(72px, 96px) minmax(42px, 1fr) 58px;
            gap: 8px;
            align-items: center;
            font-size: 13px;
            min-width: 0;
        }

        .score-label {
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-bar {
            height: 10px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            min-width: 36px;
        }

        .score-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }

        .score-value {
            text-align: right;
            font-family: var(--mono);
            color: var(--muted);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .compare-column {
            min-width: 0;
        }

        .compare-column .result-header {
            margin-bottom: 12px;
        }

        .compare-column .step-card {
            grid-template-columns: 28px minmax(180px, 0.95fr) minmax(160px, 1.05fr);
        }

        .compare-column .step-media {
            min-height: 160px;
        }

        .compare-column .step-detail h3 {
            font-size: 14px;
        }

        .compare-column .step-detail p {
            font-size: 12px;
        }

        .compare-column .kv-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .compare-column .output-card {
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .compare-column .score-row {
            grid-template-columns: minmax(78px, 120px) minmax(54px, 1fr) 58px;
            font-size: 12px;
        }

        .is-hidden {
            display: none !important;
        }

        @media (max-width: 1180px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .control-panel {
                position: static;
            }

            .compare-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            .shell {
                width: min(100% - 20px, 1500px);
                padding-top: 12px;
            }

            .topbar {
                grid-template-columns: 1fr;
            }

            .status-pill {
                justify-self: start;
            }

            .step-card,
            .compare-column .step-card {
                grid-template-columns: 1fr;
            }

            .step-index {
                width: 100%;
                height: 30px;
            }

            .kv-grid,
            .compare-column .kv-grid,
            .output-card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">HOG</div>
                <div>
                    <h1>Traffic Sign Model Lab</h1>
                    <p>Four classical HOG classifiers with visible feature extraction.</p>
                </div>
            </div>
            <div id="model-status" class="status-pill">Loading models</div>
        </header>

        <div class="workspace">
            <aside class="panel control-panel">
                <h2 class="section-title">Input image</h2>
                <label id="drop-zone" class="drop-zone">
                    <input id="file-input" type="file" accept="image/*">
                    <div id="drop-copy" class="drop-copy">
                        <strong>Choose an image</strong>
                        <div>or drop it here</div>
                    </div>
                    <div id="preview" class="preview">
                        <img id="preview-img" alt="Selected image preview">
                        <div>
                            <div id="preview-name" class="preview-name"></div>
                            <div id="preview-meta" class="preview-meta"></div>
                        </div>
                    </div>
                </label>

                <div class="tabs" role="tablist">
                    <button id="single-tab-btn" class="tab-button active" type="button">Single model</button>
                    <button id="compare-tab-btn" class="tab-button" type="button">Compare models</button>
                </div>

                <section id="single-pane" class="tab-pane active">
                    <h2 class="section-title">Model selector</h2>
                    <div id="model-rail" class="model-rail"></div>
                    <button id="single-run-btn" class="primary-action" type="button">Run selected model</button>
                </section>

                <section id="compare-pane" class="tab-pane">
                    <h2 class="section-title">Compare selector</h2>
                    <div class="compare-selectors">
                        <div class="field">
                            <label for="left-model">Left model</label>
                            <select id="left-model"></select>
                        </div>
                        <div class="field">
                            <label for="right-model">Right model</label>
                            <select id="right-model"></select>
                        </div>
                    </div>
                    <button id="compare-run-btn" class="primary-action" type="button">Run comparison</button>
                </section>

                <div id="error-box" class="alert alert-error is-hidden"></div>
            </aside>

            <section id="results" class="panel results">
                <div id="empty-state" class="empty-state">
                    <div>
                        <strong>No analysis yet</strong>
                        <span>Select an image and run a HOG model.</span>
                    </div>
                </div>
                <div id="single-results" class="is-hidden"></div>
                <div id="compare-results" class="is-hidden"></div>
            </section>
        </div>
    </main>

    <script>
        (() => {
            const state = {
                models: [],
                activeTab: "single",
                selectedSingle: "",
                file: null,
            };

            const els = {
                modelStatus: document.getElementById("model-status"),
                fileInput: document.getElementById("file-input"),
                dropZone: document.getElementById("drop-zone"),
                dropCopy: document.getElementById("drop-copy"),
                preview: document.getElementById("preview"),
                previewImg: document.getElementById("preview-img"),
                previewName: document.getElementById("preview-name"),
                previewMeta: document.getElementById("preview-meta"),
                singleTabBtn: document.getElementById("single-tab-btn"),
                compareTabBtn: document.getElementById("compare-tab-btn"),
                singlePane: document.getElementById("single-pane"),
                comparePane: document.getElementById("compare-pane"),
                modelRail: document.getElementById("model-rail"),
                leftModel: document.getElementById("left-model"),
                rightModel: document.getElementById("right-model"),
                singleRunBtn: document.getElementById("single-run-btn"),
                compareRunBtn: document.getElementById("compare-run-btn"),
                errorBox: document.getElementById("error-box"),
                emptyState: document.getElementById("empty-state"),
                singleResults: document.getElementById("single-results"),
                compareResults: document.getElementById("compare-results"),
            };

            const apiBase = (() => {
                if (window.location.protocol === "file:") {
                    return "http://localhost:5000";
                }
                return window.location.origin;
            })();

            const escapeHtml = (value) => String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");

            const setHidden = (element, hidden) => {
                element.classList.toggle("is-hidden", hidden);
            };

            const showError = (message) => {
                els.errorBox.textContent = message;
                setHidden(els.errorBox, false);
            };

            const clearError = () => {
                els.errorBox.textContent = "";
                setHidden(els.errorBox, true);
            };

            const setLoading = (loading) => {
                els.singleRunBtn.disabled = loading;
                els.compareRunBtn.disabled = loading;
                els.singleRunBtn.textContent = loading ? "Running..." : "Run selected model";
                els.compareRunBtn.textContent = loading ? "Running..." : "Run comparison";
            };

            const formatScore = (score) => {
                if (score === null || score === undefined || Number.isNaN(Number(score))) {
                    return "--";
                }
                return `${Number(score).toFixed(2)}%`;
            };

            const formatHogParams = (params) => {
                const ppc = params.pixels_per_cell || [];
                const cpb = params.cells_per_block || [];
                return `ori=${params.orientations}, ppc=${ppc.join("x")}, cpb=${cpb.join("x")}`;
            };

            const formatFeatureExtractor = (modelOrResult) => {
                const name = modelOrResult.feature_extractor || "HOG";
                const hsvBins = modelOrResult.hsv_hist_bins;
                if (name === "HOG_HSV" && Array.isArray(hsvBins)) {
                    return `HOG + HSV(${hsvBins.join("-")})`;
                }
                return name;
            };

            const setActiveTab = (tab) => {
                state.activeTab = tab;
                els.singleTabBtn.classList.toggle("active", tab === "single");
                els.compareTabBtn.classList.toggle("active", tab === "compare");
                els.singlePane.classList.toggle("active", tab === "single");
                els.comparePane.classList.toggle("active", tab === "compare");
                setHidden(els.singleResults, tab !== "single" || !els.singleResults.dataset.hasResult);
                setHidden(els.compareResults, tab !== "compare" || !els.compareResults.dataset.hasResult);
                setHidden(els.emptyState, Boolean(
                    (tab === "single" && els.singleResults.dataset.hasResult) ||
                    (tab === "compare" && els.compareResults.dataset.hasResult)
                ));
            };

            const populateModels = (models) => {
                state.models = models;
                state.selectedSingle = models[0] ? models[0].id : "";

                els.modelRail.innerHTML = models.map((model) => `
                    <button class="model-button ${model.id === state.selectedSingle ? "active" : ""}" type="button" data-model-id="${escapeHtml(model.id)}">
                        <span>
                            <span class="model-name">${escapeHtml(model.name)}</span>
                            <span class="model-meta">${escapeHtml(model.type)} | ${escapeHtml(formatFeatureExtractor(model))} | ${escapeHtml(formatHogParams(model.hog_params))}</span>
                        </span>
                        <span class="model-tag">${escapeHtml(model.tag)}</span>
                    </button>
                `).join("");

                const options = models.map((model) => `
                    <option value="${escapeHtml(model.id)}">${escapeHtml(model.name)}</option>
                `).join("");
                els.leftModel.innerHTML = options;
                els.rightModel.innerHTML = options;
                if (models[0]) {
                    els.leftModel.value = models[0].id;
                }
                if (models[1]) {
                    els.rightModel.value = models[1].id;
                }

                els.modelRail.querySelectorAll(".model-button").forEach((button) => {
                    button.addEventListener("click", () => {
                        state.selectedSingle = button.dataset.modelId;
                        els.modelRail.querySelectorAll(".model-button").forEach((item) => {
                            item.classList.toggle("active", item === button);
                        });
                    });
                });

                els.modelStatus.textContent = `${models.length} HOG models loaded`;
            };

            const handleFile = (file) => {
                if (!file) {
                    return;
                }
                state.file = file;
                clearError();
                els.previewName.textContent = file.name;
                els.previewMeta.textContent = `${(file.size / 1024).toFixed(1)} KB`;
                els.previewImg.src = URL.createObjectURL(file);
                els.dropCopy.style.display = "none";
                els.preview.style.display = "grid";
            };

            const requestPrediction = async (modelIds) => {
                if (!state.file) {
                    showError("Please choose an image first.");
                    return null;
                }
                clearError();
                setLoading(true);

                const formData = new FormData();
                formData.append("file", state.file);
                formData.append("models", modelIds.join(","));

                try {
                    const response = await fetch(`${apiBase}/api/predict`, {
                        method: "POST",
                        body: formData,
                    });
                    const data = await response.json();
                    if (!response.ok || data.error) {
                        showError(data.error || `Request failed with status ${response.status}.`);
                        return null;
                    }
                    return data;
                } catch (error) {
                    showError("Could not reach the backend server.");
                    return null;
                } finally {
                    setLoading(false);
                }
            };

            const renderKeyValues = (items) => `
                <div class="kv-grid">
                    ${items.map((item) => `
                        <div class="kv">
                            <span>${escapeHtml(item.label)}</span>
                            <strong>${escapeHtml(item.value)}</strong>
                        </div>
                    `).join("")}
                </div>
            `;

            const renderScoreList = (topScores) => {
                if (!topScores || !topScores.length) {
                    return `<div class="score-list"><div class="score-row">No score details</div></div>`;
                }
                return `
                    <div class="score-list">
                        ${topScores.map((item) => {
                            const width = Math.max(0, Math.min(100, Number(item.score) || 0));
                            return `
                                <div class="score-row">
                                    <div class="score-label">${escapeHtml(item.label)}</div>
                                    <div class="score-bar"><div class="score-fill" style="width: ${width}%"></div></div>
                                    <div class="score-value">${formatScore(item.score)}</div>
                                </div>
                            `;
                        }).join("")}
                    </div>
                `;
            };

            const stepCard = (index, title, image, description, details) => `
                <article class="step-card">
                    <div class="step-index">${String(index).padStart(2, "0")}</div>
                    <div class="step-media"><img src="${image || ""}" alt="${escapeHtml(title)}"></div>
                    <div class="step-detail">
                        <h3>${escapeHtml(title)}</h3>
                        <p>${escapeHtml(description)}</p>
                        ${details || ""}
                    </div>
                </article>
            `;

            const renderPipeline = (result) => {
                const params = result.hog_params || {};
                const pred = result.prediction || {};
                const size = result.image_size || [];
                const featureLengths = result.feature_lengths || {};
                const usesHsv = result.feature_extractor === "HOG_HSV";

                const outputDetails = `
                    <div class="output-card">
                        <div class="prediction-box">
                            <div class="prediction-label">${escapeHtml(pred.label || "Unknown")}</div>
                            <div class="prediction-score">${escapeHtml(pred.score_type || "score")}: ${formatScore(pred.confidence)}</div>
                        </div>
                        ${renderScoreList(pred.top_scores || [])}
                    </div>
                `;

                return `
                    <div class="pipeline">
                        ${stepCard(
                            1,
                            "Input image",
                            result.steps.original,
                            "Raw upload before any feature extraction.",
                            renderKeyValues([
                                { label: "Model", value: result.name },
                                { label: "File", value: result.path },
                                { label: "Classes", value: result.classes.join(", ") },
                            ])
                        )}
                        ${stepCard(
                            2,
                            "Grayscale",
                            result.steps.grayscale,
                            "The RGB/BGR image is converted to one luminance channel.",
                            renderKeyValues([
                                { label: "Channels", value: "1" },
                                { label: "Range", value: "0.0 to 1.0" },
                                { label: "Purpose", value: "shape and edge focus" },
                            ])
                        )}
                        ${stepCard(
                            3,
                            "Resize",
                            result.steps.resized,
                            "The grayscale image is resized to the training resolution.",
                            renderKeyValues([
                                { label: "Width", value: size[1] || 128 },
                                { label: "Height", value: size[0] || 128 },
                                { label: "Anti aliasing", value: "true" },
                            ])
                        )}
                        ${stepCard(
                            4,
                            "HOG visualization",
                            result.steps.hog,
                            "Gradients are grouped into cells and normalized across local blocks.",
                            renderKeyValues([
                                { label: "Orientations", value: params.orientations },
                                { label: "Pixels/cell", value: (params.pixels_per_cell || []).join("x") },
                                { label: "Cells/block", value: (params.cells_per_block || []).join("x") },
                            ])
                        )}
                        ${stepCard(
                            5,
                            `${result.type} output`,
                            result.steps.original,
                            usesHsv
                                ? "The selected model uses HOG shape descriptors plus HSV color descriptors and returns the predicted class."
                                : "The selected model uses the HOG descriptors and returns the predicted class.",
                            usesHsv
                                ? renderKeyValues([
                                    { label: "Extractor", value: formatFeatureExtractor(result) },
                                    { label: "HOG", value: Number(featureLengths.hog || 0).toLocaleString() },
                                    { label: "HSV", value: Number(featureLengths.hsv || 0).toLocaleString() },
                                    { label: "Total", value: Number(featureLengths.total || 0).toLocaleString() },
                                ]) + outputDetails
                                : outputDetails
                        )}
                    </div>
                `;
            };

            const renderSingle = (data) => {
                const result = data.results[0];
                els.singleResults.innerHTML = `
                    <div class="result-header">
                        <div>
                            <h2 class="result-title">${escapeHtml(result.name)}</h2>
                            <div class="result-subtitle">${escapeHtml(data.filename)} | ${data.input.width}x${data.input.height}px</div>
                        </div>
                        <div class="model-chip">${escapeHtml(result.type)} | ${escapeHtml(result.tag)}</div>
                    </div>
                    ${renderPipeline(result)}
                `;
                els.singleResults.dataset.hasResult = "true";
                setActiveTab("single");
            };

            const renderCompare = (data) => {
                els.compareResults.innerHTML = `
                    <div class="result-header">
                        <div>
                            <h2 class="result-title">Model comparison</h2>
                            <div class="result-subtitle">${escapeHtml(data.filename)} | ${data.input.width}x${data.input.height}px</div>
                        </div>
                        <div class="model-chip">2 pipelines</div>
                    </div>
                    <div class="compare-grid">
                        ${data.results.map((result) => `
                            <section class="compare-column">
                                <div class="result-header">
                                    <div>
                                        <h2 class="result-title">${escapeHtml(result.name)}</h2>
                                        <div class="result-subtitle">${escapeHtml(result.type)} | ${escapeHtml(formatFeatureExtractor(result))} | ${escapeHtml(formatHogParams(result.hog_params))}</div>
                                    </div>
                                    <div class="model-chip">${escapeHtml(result.tag)}</div>
                                </div>
                                ${renderPipeline(result)}
                            </section>
                        `).join("")}
                    </div>
                `;
                els.compareResults.dataset.hasResult = "true";
                setActiveTab("compare");
            };

            const loadModels = async () => {
                try {
                    const response = await fetch(`${apiBase}/api/models`);
                    const data = await response.json();
                    if (!response.ok || !Array.isArray(data.models) || data.models.length === 0) {
                        throw new Error("No HOG models are available.");
                    }
                    populateModels(data.models);
                } catch (error) {
                    els.modelStatus.textContent = "Model load failed";
                    showError("Could not load model metadata from the backend.");
                }
            };

            els.singleTabBtn.addEventListener("click", () => setActiveTab("single"));
            els.compareTabBtn.addEventListener("click", () => setActiveTab("compare"));

            els.fileInput.addEventListener("change", () => {
                handleFile(els.fileInput.files && els.fileInput.files[0]);
            });

            ["dragenter", "dragover"].forEach((eventName) => {
                els.dropZone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    els.dropZone.classList.add("dragging");
                });
            });

            ["dragleave", "drop"].forEach((eventName) => {
                els.dropZone.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    els.dropZone.classList.remove("dragging");
                });
            });

            els.dropZone.addEventListener("drop", (event) => {
                const file = event.dataTransfer.files && event.dataTransfer.files[0];
                if (file) {
                    els.fileInput.files = event.dataTransfer.files;
                    handleFile(file);
                }
            });

            els.singleRunBtn.addEventListener("click", async () => {
                const modelId = state.selectedSingle || (state.models[0] && state.models[0].id);
                const data = await requestPrediction([modelId]);
                if (data) {
                    renderSingle(data);
                }
            });

            els.compareRunBtn.addEventListener("click", async () => {
                const left = els.leftModel.value;
                const right = els.rightModel.value;
                if (!left || !right) {
                    showError("Please select two models to compare.");
                    return;
                }
                const data = await requestPrediction([left, right]);
                if (data) {
                    renderCompare(data);
                }
            });

            loadModels();
        })();
    </script>
</body>
</html>
